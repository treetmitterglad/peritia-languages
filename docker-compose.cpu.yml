version: '3.8'

services:
  peritia-languages:
    build: .
    ports:
      - "8080:80"
    restart: unless-stopped
    container_name: peritia-languages
    depends_on:
      - voice-backend

  voice-backend:
    build: ./backend
    ports:
      - "5151:5151"
    restart: unless-stopped
    container_name: peritia-voice
    volumes:
      - voice-models:/app/models
    environment:
      - MODELS_DIR=/app/models

volumes:
  voice-models:
